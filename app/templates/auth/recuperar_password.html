<!DOCTYPE html>
<html>
<head>
    <title>Recuperar Contraseña | NEXUS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/logo-sena.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-sidebar">
        <h1 class="nexus-title">NEXUS</h1>
        <h1>Recuperación</h1>
        <p>Te ayudamos a volver a entrar.</p>
    </div>

    <div class="auth-content">
        <div class="form-wrapper">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='img/logo-sena.png') }}" alt="Logo SENA" class="logo-img">
            </div>

            <h2 class="form-title">¿Olvidaste tu clave?</h2>
            <p class="form-subtitle">Ingresa tu correo y te enviaremos las instrucciones.</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert-error"><span>{{ message }}</span></div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.recuperar_password') }}" novalidate>
                <div class="form-group">
                    <label for="email">Correo Institucional</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@sena.edu.co" required>
                </div>

                <button type="submit" class="btn-auth">Enviar Enlace</button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('auth.login') }}" class="auth-link">Volver al Login</a>
            </div>
        </div>
    </div>
</body>
</html>
