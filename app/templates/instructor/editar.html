{% extends "dashboard.html" %}

{% block content %}
<style>
    .form-card {
        background: white; padding: 30px; border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto;
    }
    .form-row { display: flex; gap: 25px; margin-bottom: 20px; width: 100%; }
    .form-col { flex: 1; display: flex; flex-direction: column; }
    
    label { font-weight: bold; margin-bottom: 8px; color: #4a5568; }
    
    .form-control {
        width: 100%; padding: 12px; border-radius: 8px;
        border: 1px solid #e2e8f0; outline: none; transition: all 0.3s;
        box-sizing: border-box;
    }
    .form-control:focus { border-color: #6A11CB; box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1); }

    .msg-error { 
        color: #e74c3c; background: rgba(231, 76, 60, 0.1); 
        padding: 12px; border-radius: 8px; text-align: center; 
        margin-bottom: 20px; font-weight: bold; border: 1px solid #e74c3c;
    }

    .is-invalid { border-color: #e74c3c !important; }

    .botonera-container { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }

    .btn-sena-save {
        background: linear-gradient(135deg, #6A11CB, #2575FC);
        color: white !important; border: none; padding: 12px 40px;
        border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem;
    }
    
    .btn-sena-cancel {
        background-color: #f1f1f1; color: #555 !important; border: none; 
        padding: 12px 40px; border-radius: 50px; font-weight: bold; 
        text-decoration: none; font-size: 1rem;
    }
</style>

<div class="dashboard-area">
    <h2 style="text-align: center; color: #1a202c; margin-bottom: 25px;">Editar Instructor: {{ instructor.nombres }}</h2>
    
    <div class="form-card">
        <div id="client-error-container">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="msg-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form id="formEditar" method="POST" action="{{ url_for('instructor.editar_instructor', id=instructor.id) }}" novalidate>
            <div class="form-row">
                <div class="form-col">
                    <label>Nombres</label>
                    <input type="text" name="nombres" class="form-control" maxlength="50"
                           value="{{ instructor.nombres }}"
                           oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ ]/g, '')">
                </div>
                <div class="form-col">
                    <label>Apellidos</label>
                    <input type="text" name="apellidos" class="form-control" maxlength="50"
                           value="{{ instructor.apellidos }}"
                           oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ ]/g, '')">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>Tipo Documento</label>
                    <select name="tipo_documento" class="form-control">
                        <option value="CC" {% if instructor.tipo_documento == 'CC' %}selected{% endif %}>Cédula de Ciudadanía</option>
                        <option value="CE" {% if instructor.tipo_documento == 'CE' %}selected{% endif %}>Cédula de Extranjería</option>
                        <option value="PEP" {% if instructor.tipo_documento == 'PEP' %}selected{% endif %}>PEP</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>Número Documento</label>
                    <input type="text" name="numero_documento" class="form-control" maxlength="15"
                           value="{{ instructor.numero_documento }}"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>Profesión</label>
                    <input type="text" name="profesion" class="form-control" maxlength="80" 
                           value="{{ instructor.profesion }}">
                </div>
                <div class="form-col">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" class="form-control" maxlength="10"
                           value="{{ instructor.telefono }}"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" maxlength="100" 
                           value="{{ instructor.correo }}">
                </div>
                <div class="form-col">
                    <label>Asignar a Coordinación</label>
                    <select name="coordinacion_id" class="form-control">
                        {% for c in coordinaciones %}
                            <option value="{{ c.id }}" {% if instructor.coordinacion_id == c.id %}selected{% endif %}>
                                {{ c.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="botonera-container">
                <a href="{{ url_for('instructor.listar_instructores') }}" class="btn-sena-cancel">Cancelar</a>
                <button type="submit" class="btn-sena-save">Actualizar Cambios</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('formEditar').addEventListener('submit', function(e) {
    let inputs = this.querySelectorAll('.form-control');
    let errorContainer = document.getElementById('client-error-container');
    let hayError = false;

    errorContainer.innerHTML = '';
    inputs.forEach(input => input.classList.remove('is-invalid'));

    for (let input of inputs) {
        if (input.value.trim() === "") {
            hayError = true;
            input.classList.add('is-invalid');
        }
    }

    if (hayError) {
        e.preventDefault();
        errorContainer.innerHTML = '<div class="msg-error">Todos los campos son obligatorios para actualizar.</div>';
        window.scrollTo(0, 0);
    }
});
</script>
{% endblock %}
